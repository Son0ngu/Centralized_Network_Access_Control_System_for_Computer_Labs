{% extends "base.html" %}

{% block title %}Change Password - Firewall Controller{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/change_password.css') }}">
{% endblock %}

{% block content %}
<div class="card password-card">
    <div class="card-header text-center">
        <h4 class="fw-bold mb-1"><i class="fas fa-key me-2"></i>Change Password</h4>
        <p class="mb-0 opacity-75 small">Change your personal account password</p>
    </div>
    <div class="card-body p-4">
        <div id="changeAlert" class="alert d-none" role="alert"></div>

        <form id="changePasswordForm">
            <div class="mb-3">
                <label class="form-label fw-semibold">Current password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="oldPassword"
                           placeholder="Enter current password" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">New password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-key"></i></span>
                    <input type="password" class="form-control" id="newPassword"
                           placeholder="Minimum 8 characters" required>
                </div>
                <div class="progress mt-2">
                    <div class="progress-bar strength-bar" id="strengthBar" style="width: 0%"></div>
                </div>
                <small class="text-muted" id="strengthText"></small>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Confirm new password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-check-double"></i></span>
                    <input type="password" class="form-control" id="confirmPassword"
                           placeholder="Re-enter new password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2" id="changeBtn">
                <i class="fas fa-save me-2"></i>Change Password
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    'use strict';

    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('changePasswordForm');
        const newPwInput = document.getElementById('newPassword');
        const alertBox = document.getElementById('changeAlert');

        // Password strength indicator
        newPwInput.addEventListener('input', function() {
            const pw = this.value;
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            let strength = 0;
            if (pw.length >= 8) strength++;
            if (pw.length >= 12) strength++;
            if (/[A-Z]/.test(pw)) strength++;
            if (/[0-9]/.test(pw)) strength++;
            if (/[^A-Za-z0-9]/.test(pw)) strength++;

            const levels = [
                { width: '0%', color: '#dc3545', label: '' },
                { width: '20%', color: '#dc3545', label: 'Very weak' },
                { width: '40%', color: '#ffc107', label: 'Weak' },
                { width: '60%', color: '#fd7e14', label: 'Medium' },
                { width: '80%', color: '#20c997', label: 'Strong' },
                { width: '100%', color: '#28a745', label: 'Very strong' },
            ];
            const level = levels[strength] || levels[0];
            bar.style.width = level.width;
            bar.style.background = level.color;
            text.textContent = pw.length > 0 ? level.label : '';
        });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            alertBox.classList.add('d-none');

            const oldPw = document.getElementById('oldPassword').value;
            const newPw = document.getElementById('newPassword').value;
            const confirmPw = document.getElementById('confirmPassword').value;

            if (!oldPw || !newPw || !confirmPw) {
                showAlert('danger', 'Please fill in all fields');
                return;
            }
            if (newPw.length < 8) {
                showAlert('danger', 'New password must be at least 8 characters');
                return;
            }
            if (newPw !== confirmPw) {
                showAlert('danger', 'Passwords do not match');
                return;
            }

            const btn = document.getElementById('changeBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Processing...';

            try {
                const resp = await fetch('/api/admin/auth/change-password', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ old_password: oldPw, new_password: newPw }),
                });
                const data = await resp.json();

                if (data.success) {
                    showAlert('success', 'Password changed successfully! Redirecting...');
                    form.reset();
                    document.getElementById('strengthBar').style.width = '0%';
                    document.getElementById('strengthText').textContent = '';
                    setTimeout(() => { window.location.href = '/'; }, 2000);
                } else {
                    showAlert('danger', data.error || 'Password change failed');
                }
            } catch (err) {
                showAlert('danger', 'Server connection error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save me-2"></i>Change Password';
            }
        });

        function showAlert(type, msg) {
            alertBox.className = `alert alert-${type}`;
            alertBox.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>${msg}`;
            alertBox.classList.remove('d-none');
        }
    });
})();
</script>
{% endblock %}
