<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Error - Firewall Controller{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    {% block extra_css %}{% endblock %}
</head>
<body style="background: #FAFAFA; min-height: 100vh; color: #18181B;">
    <nav class="navbar" style="background: #FFFFFF; border-bottom: 1px solid #F4F4F5; box-shadow: 0 1px 0 rgba(16,24,40,0.04), 0 1px 6px rgba(16,24,40,0.04);">
        <div class="container">
            <a class="navbar-brand" href="/" style="color: #18181B; font-weight: 700; letter-spacing: -0.01em;">
                <i class="fas fa-shield-alt me-2" style="color: #6366F1;"></i>Firewall Controller
            </a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
